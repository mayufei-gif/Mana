version: "MVP-2.5B"
system_name: "InfoRadar 个人全域情报雷达"

source_layers:
  A_core: "核心刚需：学校、就业、证书、专业、政策、毕业实习等高优先级信息"
  B_observe: "重点观察：时事、科技、开源、行业、财经、法律权益、健康等持续跟踪信息"
  C_opportunity: "机会探索：竞赛、项目、创业、副业观察、资源购买、工具软件等"
  D_risk: "风险观察：诈骗、虚假招聘、培训贷、盗版破解、隐私泄露、账号风险等"
  E_supplement: "低频补充：兴趣、生活、娱乐、审美、文化等非刚需信息"

acquisition_modes:
  rss: "公开 RSS/Atom/官方 Feed"
  rsshub: "RSSHub 合规公开路由"
  official_page: "公开官网/公告页人工或定期检查"
  official_api: "公开官方 API"
  manual_forward: "用户手动转发链接/文本/截图"
  manual_import: "用户手动导入 OPML/收藏/表格"
  search_watch: "公开搜索/公开页面观察"
  price_watch: "公开商品标题、价格、评价线索观察"
  paid_metadata_only: "仅记录付费内容公开目录、价格、试看、评价"
  disabled: "禁用，不采集"

paywall_policies:
  public_only: "只使用公开内容"
  metadata_only: "只记录公开元信息"
  paid_owned_only: "仅处理用户已合法拥有并手动提供的内容"
  forbidden_bypass: "禁止绕过付费墙、登录、验证码、DRM、反爬或访问控制"

