  - 生活权益
  - 机会观察
  - 文化娱乐
  - 风险提醒
  - 今日建议

collection_boundaries:
  allowed:
    - 公开 RSS/Atom
    - 公开网页
    - 官方公告
    - 公开 API
    - RSSHub 合规公开路由
    - 用户手动转发的链接/文本/截图
    - 用户自己导出的收藏、订阅、OPML、表格
  forbidden:
    - 绕过登录
    - 绕过验证码
    - 破解付费内容
    - 抓取会员课程正文
    - 绕过平台反爬
    - 收集无关个人隐私
    - 自动批量骚扰评论、私信或账号
    - 传播盗版、破解、注册机或侵权资源
